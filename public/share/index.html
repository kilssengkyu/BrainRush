<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open BrainRush</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e3a8a, #020617 70%);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(92vw, 460px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 24px;
      background: rgba(15, 23, 42, 0.7);
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; opacity: 0.85; }
    .btn {
      margin-top: 18px;
      display: inline-flex;
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening BrainRush...</h1>
    <p>If the app does not open, tap the button below.</p>
    <button id="openBtn" class="btn" type="button">Open App</button>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target') || '/';
      const schemeBase = params.get('scheme') || 'com.kilssengkyu.brainrush://open';
      const iosStore = params.get('ios') || 'https://apps.apple.com';
      const androidStore = params.get('android') || 'https://play.google.com/store/apps';

      const deepLink = schemeBase + (target.startsWith('/') ? target : ('/' + target));
      const ua = navigator.userAgent || '';
      const isIOS = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);
      const storeUrl = isIOS ? iosStore : (isAndroid ? androidStore : iosStore);

      const openApp = function () {
        window.location.href = deepLink;
      };

      document.getElementById('openBtn').addEventListener('click', openApp);
      openApp();

      window.setTimeout(function () {
        window.location.href = storeUrl;
      }, 1400);
    })();
  </script>
</body>
</html>
